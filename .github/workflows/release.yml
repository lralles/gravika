name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-cli-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux CLI executable
        run: |
          pyinstaller --onefile src/application/cli.py \
            --paths=.
          mv dist/cli dist/cli-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-executable-linux
          path: dist/cli-linux

  build-cli-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS CLI executable
        run: |
          pyinstaller --onefile src/application/cli.py \
            --paths=.
          mv dist/cli dist/cli-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-executable-macos
          path: dist/cli-macos

  build-cli-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows CLI executable
        run: |
            pyinstaller --onefile src\application\cli.py `
                --paths=.
            Rename-Item dist\cli.exe cli-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-executable-windows
          path: dist\cli-windows.exe

  build-gui-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux GUI executable
        run: |
          pyinstaller --onefile src/application/main.py \
            --hidden-import=matplotlib.backends.backend_svg \
            --hidden-import=PIL._tkinter_finder \
            --paths=.
          mv dist/main dist/gui-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-executable-linux
          path: dist/gui-linux

  build-gui-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS GUI executable
        run: |
          pyinstaller --onefile src/application/main.py \
            --hidden-import=matplotlib.backends.backend_svg \
            --hidden-import=PIL._tkinter_finder \
            --paths=.
          mv dist/main dist/gui-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-executable-macos
          path: dist/gui-macos

  build-gui-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows GUI executable
        run: |
            pyinstaller --onefile src\application\main.py `
                --hidden-import=matplotlib.backends.backend_svg `
                --hidden-import=PIL._tkinter_finder `
                --paths=.
            Rename-Item dist\main.exe gui-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-executable-windows
          path: dist\gui-windows.exe

  release:
    needs: [build-cli-linux, build-cli-macos, build-cli-windows, build-gui-linux, build-gui-macos, build-gui-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete Previous Release
        run: |
          gh release delete "latest" --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Latest Release"
          tag_name: "latest"
          files: |
            dist/cli-executable-linux/cli-linux
            dist/cli-executable-macos/cli-macos
            dist/cli-executable-windows/cli-windows.exe
            dist/gui-executable-linux/gui-linux
            dist/gui-executable-macos/gui-macos
            dist/gui-executable-windows/gui-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
